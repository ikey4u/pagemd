<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pagemd - Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div id="app">
    <h1>pagemd Settings</h1>

    <section class="card">
      <h2>General</h2>
      <form id="settings-form">
        <div class="field">
          <label>
            <input type="checkbox" id="opt-debug-mode">
            Debug Mode
          </label>
          <p class="hint">Enable chrome.debugger fallback for pages with strict CSP. A yellow banner will appear on affected pages.</p>
        </div>
        <div class="field">
          <label>
            <input type="checkbox" id="opt-include-title" checked>
            Include title heading in Markdown
          </label>
        </div>
        <div class="field">
          <label>
            <input type="checkbox" id="opt-include-url" checked>
            Include source URL in Markdown
          </label>
        </div>
        <div class="field">
          <label>Default delay (seconds): </label>
          <input type="number" id="opt-delay-min" value="2" min="0" max="60" step="0.5" style="width:60px">
          –
          <input type="number" id="opt-delay-max" value="4" min="0" max="60" step="0.5" style="width:60px">
        </div>
        <div class="field">
          <label>Default max pages: </label>
          <input type="number" id="opt-max-pages" value="100" min="1" max="10000" style="width:80px">
        </div>
        <button type="submit" class="btn-primary">Save Settings</button>
        <span id="status"></span>
      </form>
    </section>

    <section class="card">
      <h2>Saved Recipes</h2>
      <div id="recipes-list"></div>
      <div class="recipe-actions">
        <button id="btn-export" class="btn-small">Export All (JSON)</button>
        <button id="btn-import" class="btn-small">Import</button>
        <input type="file" id="file-import" accept=".json" style="display:none;">
      </div>
    </section>
  </div>
  <script src="options.js" type="module"></script>
</body>
</html>
